services:
  backend:
    build: ./backend
    ports:
      - "8010:8010"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - OPENAI_MODEL=gpt-4o-mini
      - UPLOAD_DIR=/tmp/interview_uploads
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost"]
    volumes:
      - upload_data:/tmp/interview_uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/v1/interview/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  upload_data:
